name: CI — AI Daily Planner

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  quality:
    name: 🔍 Qualité du code
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: ⚙️ Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Installer les dépendances
        run: npm ci

      - name: 🔷 Vérifier les types TypeScript
        run: npm run type-check

      - name: 🧹 Vérifier ESLint
        run: npm run lint

  build:
    name: 🏗️ Build de production
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: ⚙️ Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Installer les dépendances
        run: npm ci

      - name: 🔨 Build Next.js
        run: npm run build
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}

      - name: 📊 Afficher la taille du build
        run: |
          echo "=== Taille du dossier .next ==="
          du -sh .next
          echo "=== Routes générées ==="
          ls .next/server/app/

  docker:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🔧 Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Générer les tags de l'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ai-daily-planner
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: 🐳 Build et push l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AI_API_KEY=${{ secrets.AI_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Résumé Docker
        run: |
          echo "Image publiée :"
          echo "${{ steps.meta.outputs.tags }}"

  success:
    name: ✅ Pipeline réussi
    runs-on: ubuntu-latest
    needs: [quality, build, docker]
    if: always()
    steps:
      - name: 🎉 Résumé
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║   ✅  Pipeline CI/CD réussi               ║"
          echo "║   🔷  TypeScript      → OK                ║"
          echo "║   🧹  ESLint          → OK                ║"
          echo "║   🏗️  Build Next.js   → OK                ║"
          echo "║   🐳  Image Docker    → Docker Hub        ║"
          echo "║   🚀  Vercel          → Déploiement auto  ║"
          echo "╚══════════════════════════════════════════╝"
